server {
    listen 17051;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location ${BASE_PATH}api/ {
        proxy_pass http://api:17052/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = ${BASE_PATH}api/admin/events {
        proxy_pass http://api:17052/api/admin/events;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }

    location = ${BASE_PATH}health {
        proxy_pass http://api:17052/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ${BASE_PATH} {
        rewrite ^${BASE_PATH}(.*) /$1 break;
        try_files $uri @spa_fallback;
    }

    location @spa_fallback {
        try_files /index.html =404;
    }
}
