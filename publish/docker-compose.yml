version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: web.Dockerfile
    env_file:
      - .env
    depends_on:
      api:
        condition: service_started
    ports:
      - "17051:17051"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    command: ["postgres", "-p", "17053"]
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-notify_center}"
      POSTGRES_USER: "${POSTGRES_USER:-notify}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-this-postgres-password}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -p 17053"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api.Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: "${ASPNETCORE_URLS:-http://+:17052}"
      DATABASE_URL: "Host=db;Port=17053;Database=${POSTGRES_DB:-notify_center};Username=${POSTGRES_USER:-notify};Password=${POSTGRES_PASSWORD:-change-this-postgres-password}"
      JWT_ISSUER: "${JWT_ISSUER:-NotifyCenter}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-NotifyCenterClients}"
      JWT_SIGNING_KEY: "${JWT_SIGNING_KEY:-replace-with-a-32-character-secret}"
      JWT_EXPIRES_MINUTES: "${JWT_EXPIRES_MINUTES:-1440}"
      NOTIFICATION_POLL_SECONDS: "${NOTIFICATION_POLL_SECONDS:-30}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_DEFAULT_CHAT_ID: "${TELEGRAM_DEFAULT_CHAT_ID:-}"
      TELEGRAM_PARSE_MODE: "${TELEGRAM_PARSE_MODE:-Markdown}"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "17052:17052"
    restart: unless-stopped

volumes:
  pgdata:
